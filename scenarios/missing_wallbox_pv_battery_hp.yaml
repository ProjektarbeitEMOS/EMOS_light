name: missing_wallbox_pv_battery_hp
description: >
  Haus mit PV, Batterie und Waermepumpe, aber ohne Wallbox/E-Auto. Das
  Szenario prueft, ob EMOS ohne Mobilitaetskomponente sauber laeuft.
date: 2026-03-22
mode: milp
components:
  pv: true
  battery: true
  heat_pump: true
  hot_water_storage: true
  fresh_water_station: true
  underfloor_heating: true
  building: true
config_overrides:
  general:
    optimization_horizon_hours: 24
  battery:
    capacity_kwh: 10.0
    initial_soc: 0.50
    min_soc: 0.10
    max_soc: 0.90
  wallboxes: []
  electric_vehicles: []
input_overrides:
  prices_ct_kwh:
    default: 34
    windows:
      - start: "18:00"
        end: "22:00"
        value: 52
  pv_generation_kw:
    default: 0
    windows:
      - start: "10:00"
        end: "15:00"
        value: 5
  household_load_kw:
    default: 0.8
    windows:
      - start: "18:00"
        end: "21:00"
        value: 1.8
  outside_temp_c: 4
  heating_demand_kw: 1.8
  hot_water_demand_kw:
    default: 0
    windows:
      - start: "06:00"
        end: "08:00"
        value: 1.3
checks:
  - type: success
    name: optimization_success
    expected: true
  - type: metric
    name: pv_energy_positive
    metric: pv_total_kwh
    op: ">"
    value: 15
  - type: series_max
    name: battery_soc_below_max
    field: batt_soc_kwh
    op: "<="
    value: 9.0
    tolerance: 0.01
  - type: no_simultaneous_battery
    name: no_charge_discharge_overlap
    tolerance: 0.0001
