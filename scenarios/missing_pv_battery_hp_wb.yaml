name: missing_pv_battery_hp_wb
description: >
  Vollhaus ohne PV-Anlage. Batterie, Waermepumpe und Wallbox sind vorhanden.
  Das Szenario prueft, ob EMOS auch ohne lokale Erzeugung stabil optimiert.
date: 2026-02-18
mode: milp
components:
  pv: false
  battery: true
  heat_pump: true
  hot_water_storage: true
  fresh_water_station: true
  underfloor_heating: true
  building: true
config_overrides:
  general:
    optimization_horizon_hours: 24
    max_grid_power_kw: 20.0
  battery:
    capacity_kwh: 10.0
    initial_soc: 0.60
    min_soc: 0.10
    max_soc: 0.90
  wallboxes:
    - name: Wallbox 1
      enabled: true
      max_power_kw: 11.0
      min_power_kw: 1.4
      phases: 3
      ev_battery_capacity_kwh: 60.0
      current_soc: 0.45
      target_soc: 0.70
      arrival_hour: 18
      departure_hour: 7
      charging_efficiency: 0.92
      min_range_enabled: true
  electric_vehicles: []
input_overrides:
  prices_ct_kwh:
    default: 38
    windows:
      - start: "01:00"
        end: "05:00"
        value: 28
      - start: "18:00"
        end: "22:00"
        value: 58
  pv_generation_kw: 0
  household_load_kw:
    default: 0.8
    windows:
      - start: "18:00"
        end: "21:00"
        value: 2.2
  outside_temp_c: -2
  heating_demand_kw: 2.2
  hot_water_demand_kw:
    default: 0
    windows:
      - start: "06:00"
        end: "08:00"
        value: 1.6
checks:
  - type: success
    name: optimization_success
    expected: true
  - type: metric
    name: pv_energy_zero
    metric: pv_total_kwh
    op: "=="
    value: 0
    tolerance: 0.001
  - type: ev_soc_at_departure
    name: ev_target_without_pv
    wallbox: Wallbox 1
    departure_hour: 7
    unit: soc
    op: ">="
    value: 0.70
    tolerance: 0.2
