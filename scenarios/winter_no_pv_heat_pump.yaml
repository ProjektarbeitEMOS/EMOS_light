name: winter_no_pv_heat_pump
description: >
  Kalter Wintertag ohne PV-Erzeugung. Das Szenario prueft, ob die
  Waermepumpe Heizbedarf und Komfort bedienen kann und das Startlimit
  eingehalten wird.
date: 2026-01-20
mode: milp
components:
  pv: false
  battery: false
  heat_pump: true
  hot_water_storage: true
  fresh_water_station: true
  underfloor_heating: true
  building: true
config_overrides:
  general:
    optimization_horizon_hours: 24
  heat_pump:
    max_starts_per_day: 8
  wallboxes: []
  electric_vehicles: []
input_overrides:
  prices_ct_kwh:
    default: 38
    windows:
      - start: "04:00"
        end: "06:00"
        value: 28
      - start: "17:00"
        end: "21:00"
        value: 55
  pv_generation_kw: 0
  household_load_kw:
    default: 0.8
    windows:
      - start: "18:00"
        end: "21:00"
        value: 1.6
  outside_temp_c: -8
  heating_demand_kw: 2.8
  hot_water_demand_kw:
    default: 0
    windows:
      - start: "06:00"
        end: "08:00"
        value: 2.0
      - start: "18:00"
        end: "20:00"
        value: 1.5
checks:
  - type: success
    name: optimization_success
    expected: true
  - type: metric
    name: hp_starts_limit
    metric: hp_starts_count
    op: "<="
    value: 8
  - type: series_min
    name: indoor_temp_comfort
    field: indoor_temp_c
    op: ">="
    value: 20.5
    tolerance: 0.1
  - type: series_min
    name: warm_water_not_too_cold
    field: ww_storage_temp_c
    op: ">="
    value: 39.5
    tolerance: 0.2
