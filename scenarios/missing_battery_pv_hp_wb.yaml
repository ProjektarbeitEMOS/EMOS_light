name: missing_battery_pv_hp_wb
description: >
  Vollhaus ohne Batteriespeicher. PV, Waermepumpe und Wallbox sind aktiv.
  Das Szenario prueft, ob EMOS ohne Speicher weiterhin sinnvoll plant.
date: 2026-04-20
mode: milp
components:
  pv: true
  battery: false
  heat_pump: true
  hot_water_storage: true
  fresh_water_station: true
  underfloor_heating: true
  building: true
config_overrides:
  general:
    optimization_horizon_hours: 24
    max_grid_power_kw: 20.0
  wallboxes:
    - name: Wallbox 1
      enabled: true
      max_power_kw: 11.0
      min_power_kw: 1.4
      phases: 3
      ev_battery_capacity_kwh: 60.0
      current_soc: 0.50
      target_soc: 0.75
      arrival_hour: 18
      departure_hour: 7
      charging_efficiency: 0.92
      min_range_enabled: true
  electric_vehicles: []
input_overrides:
  prices_ct_kwh:
    default: 35
    windows:
      - start: "11:00"
        end: "15:00"
        value: 24
      - start: "18:00"
        end: "22:00"
        value: 55
  pv_generation_kw:
    default: 0
    windows:
      - start: "10:00"
        end: "16:00"
        value: 6
  household_load_kw: 0.9
  outside_temp_c: 8
  heating_demand_kw: 1.2
  hot_water_demand_kw:
    default: 0
    windows:
      - start: "06:00"
        end: "08:00"
        value: 1.2
checks:
  - type: success
    name: optimization_success
    expected: true
  - type: metric
    name: pv_energy_positive
    metric: pv_total_kwh
    op: ">"
    value: 20
  - type: ev_soc_at_departure
    name: ev_target_without_battery
    wallbox: Wallbox 1
    departure_hour: 7
    unit: soc
    op: ">="
    value: 0.75
    tolerance: 0.2
